version: "3.8"

services:
  mongodb:
    image: mongo:latest
    container_name: todo-mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: TodoDb
    volumes:
      - mongodb_data:/data/db
    networks:
      - todo-network

  todoapi:
    build:
      context: ./TodoApi
      dockerfile: Dockerfile
    container_name: todo-api
    restart: always
    ports:
      - "5000:8080"
      - "5001:8081"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - TodoDatabase__ConnectionString=mongodb://mongodb:27017
      - TodoDatabase__DatabaseName=TodoDb
      - TodoDatabase__TodosCollectionName=Todos
      - TodoDatabase__UsersCollectionName=Users
      - JwtSettings__Secret=YourSuperSecretKeyThatIsAtLeast32CharactersLong123456789
    depends_on:
      - mongodb
    networks:
      - todo-network

volumes:
  mongodb_data:

networks:
  todo-network:
    driver: bridge
